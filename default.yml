##################################################
#  Logging
##################################################
logging:
  enabled: false
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"
  log_dir: "{{ HOME }}/anomdec/logs"
  file: "anomdec.log"

##################################################
#  admdb
##################################################
admdb:
  host: "{{ ADM_DB_HOST | default('localhost') }}"
  port: 5432
  user: anomdec
  password: "{{ ADM_DB_PASSWORD | default('') }}"
  dbname: anomdec
  schema: public

##################################################
#  data collection params (cascaded to data_sources)
##################################################
batch_size: 100
history_interval: 600        # seconds per history record
history_retention: 18        # keep last N history records (~3h)
trends_retention: 14         # days of trends to retain for stats
anomaly_keep_secs: 86400     # keep anomalies for 1 day

##################################################
#  detectors (cascaded to data_sources)
##################################################
detectors:
  zscore:
    enabled: true
    weight: 0.3
    lambda_threshold: 3.0
    min_ignore_rate: 0.05    # ignore if |h_mean - t_mean| / t_mean < this
  changepoint:
    enabled: true
    weight: 0.3
    cusum_h: 5.0             # decision threshold (in units of std)
    cusum_k: 0.5             # slack (in units of std)
  seasonal:
    enabled: true
    weight: 0.4
    lambda_threshold: 3.0

ensemble:
  min_score: 0.7            # precision-first; raise toward 0.8 to suppress more
  require_any: 2            # >=2 detectors must agree (cascade-like; cuts single-signal noise)

##################################################
#  clustering (cascaded to data_sources)
##################################################
clustering:
  jaccard_eps: 0.1
  corr_eps: 0.2
  min_samples: 2
  sigma: 2.0
  detection_period: 43200    # seconds of history used for clustering

##################################################
#  metric categories (cascaded to data_sources)
##################################################
#  Per-metric-type weighting + magnitude/duration gating.
#  An item is matched to the first category whose key_patterns (fnmatch globs
#  on items.key_ / item_name) match.  The final decision is:
#
#    effective_score = ensemble_score × weight × magnitude_scale × duration_scale
#    is_anomaly      = effective_score >= ensemble.min_score
#
#  - weight           : prior importance of the metric type (generalises to new data)
#  - magnitude.*      : scales by Δ = |recent_mean - trend_mean| (change from baseline)
#  - duration (global): scales by how long the item stayed anomalous in-window
#
#  Thresholds below are PLACEHOLDERS — tune via evaluation.backtester's
#  per-category report.  Categories are kept unit-coherent (items.csv has no
#  units column, so absolute thresholds only make sense within one metric type).
metric_categories:
  default_weight: 1.0
  duration:
    enabled: true
    measure: count            # count = total anomalous samples; consecutive = longest run
    sigma: 2.0                # sample is "anomalous" outside trend_mean ± sigma·trend_std
    lo_secs: 600             # ≤ this anomalous time (one 10-min spike) → suppressed
    hi_secs: 3600            # ≥ this (sustained ≥ 1h) → full weight
    floor: 0.0
  categories:
    # --- container / packet / session metrics: small or non-byte units, so an
    #     absolute byte/percent floor is wrong.  Driven by RELATIVE Δ instead, so
    #     a collapse to zero (delta/baseline ≈ 1.0) always scores full magnitude.
    #     Listed BEFORE the byte-based `network`/`cpu` rules so they win.
    - name: container_cpu    # docker cpu_usage rate is a small fraction, not %-points
      key_patterns: ["docker.container_stats.cpu_usage.*"]
      weight: 1.0
      magnitude: {mode: relative, lo: 0.3, hi: 1.0}
    - name: packets          # packet counts/rates, not bytes
      key_patterns: ["docker.networks.*packets*", "net.if.*packets*", "vmware.vm.net.*packets*"]
      weight: 0.6
      magnitude: {mode: relative, lo: 0.3, hi: 1.0}
    - name: session_traffic  # connection-tracking traffic; units vary by device
      key_patterns: ["*session*traffic*"]
      weight: 0.6
      magnitude: {mode: relative, lo: 0.3, hi: 1.0}
    - name: network          # bytes/sec — absolute Δ floor (steady high host → Δ≈0 → ignored)
      key_patterns: ["net.if.*", "vmware.vm.net.*", "docker.networks.*"]
      weight: 0.2
      magnitude: {mode: absolute, lo: 1048576, hi: 10485760}   # 1 MB → 10 MB
    - name: cpu_load         # load average — absolute Δ in load units (unbounded, ~scales with cores)
      key_patterns: ["system.cpu.load*"]
      weight: 1.0
      magnitude: {mode: absolute, lo: 1, hi: 4}
    - name: cpu              # percent — absolute Δ in percentage points
      key_patterns: ["system.cpu.util*", "vmware.vm.cpu.*"]
      weight: 1.0
      magnitude: {mode: absolute, lo: 10, hi: 40}
    - name: memory_pct       # percent — absolute Δ in percentage points
      key_patterns: ["vm.memory.util*", "vm.memory.pusage*", "*.pusage*"]
      weight: 0.7
      magnitude: {mode: absolute, lo: 5, hi: 30}
    - name: memory_bytes     # bytes — relative Δ (absolute level varies by host)
      key_patterns: ["vm.memory.size*", "vm.memory.free*", "vm.memory.used*", "vm.memory.buffers*", "proc.mem*", "docker.container_stats.memory.usage*"]
      weight: 0.7
      magnitude: {mode: relative, lo: 0.1, hi: 0.5}
    - name: disk             # bytes/ops — relative Δ
      key_patterns: ["vfs.fs.*", "vfs.dev.*", "truenas.dataset.*"]
      weight: 0.5
      magnitude: {mode: relative, lo: 0.05, hi: 0.3}
    # Catch-all: global relative-change floor for every uncategorised metric
    # (mssql/mysql/vmware/system counters, etc.) == the old ignore_diff_rate.
    # Must be LAST so specific categories win. Raise lo/hi to suppress more.
    - name: default          # relative Δ floor (recent vs trend); ignore small changes
      key_patterns: ["*"]
      weight: 1.0
      magnitude: {mode: relative, lo: 0.5, hi: 1.0}

##################################################
#  item / anomaly filters (cascaded to data_sources)
##################################################
#  Matched by items.key_ (fnmatch glob) AND items.units (exact); empty = match all.
#  - item_filters    drop items BEFORE detectors run (== old item_conds)
#  - anomaly_filters drop scored anomalies whose |recent-trend| change is below an
#                    operationally meaningful amount (== old item_diff_conds)
#  Ported from org/pyAnomalyDetector/samples/zabbix_psql.yml. NOTE: SQL-LIKE
#  brackets (net.if.x[y], web.test.time[z]) become a trailing * here because
#  fnmatch treats [..] as a character class.

item_filters:
  - name: ignore-uptime
    key_pattern: "*uptime*"
  - name: ignore-localtime
    key_pattern: "system.localtime"
  - name: ignore-low-traffic         # only flag interface traffic above 8 Mbps
    key_pattern: "net.if.*"
    units: "bps"
    min_value: 8000000

anomaly_filters:
  - name: cpu-pct-noise              # CPU % change must exceed 8 points
    key_pattern: "*cpu.*"
    units: "%"
    min_abs_diff: 8
  - name: mem-pct-noise
    key_pattern: "*mem.*"
    units: "%"
    min_abs_diff: 8
  - name: fs-size-pct-noise
    key_pattern: "*vfs.fs.size*"
    units: "%"
    min_abs_diff: 3
  - name: fs-size-bytes-noise        # only flag disk moves >= 1 GB
    key_pattern: "*vfs.fs.size*"
    units: "B"
    min_abs_diff: 1000000000
  - name: fs-inode-pct-noise
    key_pattern: "*vfs.fs.inode*"
    units: "%"
    min_abs_diff: 3
  - name: pused-pct-noise
    key_pattern: "*.pused*"
    units: "%"
    min_abs_diff: 3
  - name: webtest-time-noise
    key_pattern: "web.test.time*"
    units: "s"
    min_abs_diff: 1
  - name: net-traffic-noise          # ignore < 1 Mbps shifts
    key_pattern: "net.if.*"
    units: "bps"
    min_abs_diff: 1000000
  - name: pct-noise-catchall         # any percent metric: ignore < 3 point change
    units: "%"
    min_abs_diff: 3
  - name: temp-noise                 # ignore < 5 degree changes
    units: "°C"
    min_abs_diff: 5

##################################################
#  fast_detect: high-frequency short-span axis (cascaded to data_sources)
##################################################
#  A second detection axis for a small watchlist: run every 5-10 min via cron
#  (anomdec-detect-fast), score each watched item against a short window, veto
#  levels the seasonal baseline (hour_stats) considers expected (e.g. nightly
#  backup traffic), group co-occurring triggers, and write a JSON event file
#  that Zabbix polls ($.max_score) so a webhook can forward to chat.
#
#  Disabled by default. Uncomment and point `watch` at your critical items.
#
# fast_detect:
#   enabled: true
#   watch:                              # match ANY rule; empty pattern = match-all
#     - key_pattern: "cisco.asav.session.*"
#     - host_pattern: "sbc*"
#   history_span_secs: 3600             # short baseline window (~6 samples @10min)
#   detect_window: 4                    # last N samples form the "recent" mean
#   lambda_threshold: 3.0               # short-window z -> severity
#   min_item_score: 0.5                 # per-item trigger threshold
#   seasonal_veto: true                 # drop levels expected for this hour-of-day
#   seasonal_lambda: 3.0
#   cooccur: true                       # group co-triggers (noisy-OR boosts score)
#   use_zabbix_events: true             # fold severity-weighted Zabbix events into the score
#   events_window_secs: 0               # 0 = reuse history_span_secs
#   events_saturation: 3.0              # sum(severity/5) mapping to ~full host weight
#   min_event_score: 0.5                # host event weight >= this -> standalone alert
#   output_path: "/var/lib/anomdec/fast_events.json"

