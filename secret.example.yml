# secret.example.yml — template for the secrets file.
#
# Copy to a private location, fill in real values, then point the app at it:
#   export ANOMDEC_SECRET_PATH=/etc/anomdec/secret.yml
#
# Keys here become Jinja2 variables when config.yml / default.yml are rendered,
# e.g. `password: "{{ ADM_DB_PASSWORD }}"`.  Real secret files are git-ignored
# (.gitignore: `secret*.yml` with a `!secret.example.yml` exception), so name
# yours e.g. secret.yml and commit only this .example template.

# --- management DB (admdb) ---
ADM_DB_HOST: "localhost"
ADM_DB_PASSWORD: "anomdec_pass"      # must match the role created by scripts/setup.sh

# --- Zabbix source DB ---
ZABBIX_DB_HOST: "192.168.0.10"
ZABBIX_DB_PASSWORD: ""

# --- Zabbix API (used by the labeling/dashboard tools) ---
ZABBIX_PSQL_API_URL: "http://zabbix.example.com/api_jsonrpc.php"
ZABBIX_PSQL_API_USER: "Admin"
ZABBIX_PSQL_API_PASSWORD: ""
